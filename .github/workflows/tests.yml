name: Tests & Code Quality

on:
  pull_request:
    branches: ["main", "staging"]
  push:
    branches: ["main", "staging"]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: ankane/pgvector:pg16
        env:
          POSTGRES_DB: test_clm_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      
      - name: Lint with flake8
        continue-on-error: true
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Format check with black
        continue-on-error: true
        run: black --check .
      
      - name: Import sorting with isort
        continue-on-error: true
        run: isort --check-only .
      
      - name: Type checking with mypy
        continue-on-error: true
        run: mypy . --ignore-missing-imports --continue-on-error || true
      
      - name: Security check with bandit
        continue-on-error: true
        run: bandit -r . -ll -x ./tests,./manage.py || true
      
      - name: Dependency check with safety
        continue-on-error: true
        run: safety check --json || true
      
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_clm_db?sslmode=disable
          DJANGO_SECRET_KEY: test-secret-key-not-for-production
          DEBUG: 'False'
          SUPABASE_ONLY: 'False'
        run: python manage.py migrate
      
      - name: Run tests with coverage
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_clm_db?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          DJANGO_SECRET_KEY: test-secret-key-not-for-production
          DEBUG: 'False'
          SUPABASE_ONLY: 'False'
          CELERY_ALWAYS_EAGER: 'True'
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-missing --junitxml=junit.xml || true
      
      - name: Upload coverage reports
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Generate OpenAPI schema
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_clm_db?sslmode=disable
          DJANGO_SECRET_KEY: test-secret-key-not-for-production
          DEBUG: 'False'
          SUPABASE_ONLY: 'False'
        run: python manage.py spectacular --validate
      
      - name: Publish test results
        if: always()
        continue-on-error: true
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: junit.xml
          check_name: Test Results
          comment_mode: always

