substitutions:
  _REGION: asia-south1
  _SERVICE: lawflow
  _REPOSITORY: cloud-run-source-deploy
  _IMAGE_NAME: lawflow
  _APP_BASE_URL: https://lawflow.lawflow-dev.workers.dev

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: Build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$BUILD_ID
      - .

  - id: Push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$BUILD_ID

  - id: Deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$BUILD_ID
      - --region=${_REGION}
      - --set-env-vars=FRONTEND_BASE_URL=${_APP_BASE_URL},APP_URL=${_APP_BASE_URL},ALLOWED_HOSTS=lawflow.lawflow-dev.workers.dev,CORS_ALLOWED_ORIGINS=${_APP_BASE_URL}
      - --quiet

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$BUILD_ID
